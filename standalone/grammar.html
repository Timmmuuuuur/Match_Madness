<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar Guide — Match Madness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --green:      #58cc02; --green-dark: #46a302; --green-light:#d7ffb8;
        --blue:       #1cb0f6; --blue-dark:  #1899d6; --blue-light: #ddf4ff;
        --yellow:     #ffc800; --red: #ff4b4b;
        --bg:         #f0f4f8; --card: #ffffff; --text: #3c3c3c;
        --text-muted: #777;    --border: #e5e5e5; --shadow: 0 4px 0 rgba(0,0,0,.08);
        --radius:     16px;    --font: 'Nunito', system-ui, sans-serif;
        --sidebar-w:  240px;   --accent: #d97706; --accent-light: #fef3c7; --accent-dark: #92400e;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body { margin:0; font-family:var(--font); color:var(--text); background:linear-gradient(160deg,#fef9e7 0%,var(--bg) 40%,#e3f2fd 100%); min-height:100vh; }

      .topbar { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:14px; padding:12px 24px; background:rgba(255,255,255,.9); backdrop-filter:blur(8px); border-bottom:2px solid var(--border); box-shadow:0 2px 8px rgba(0,0,0,.06); }
      .topbar-logo { width:38px; height:38px; border-radius:10px; background:var(--green); color:#fff; font-weight:800; font-size:.9rem; display:grid; place-items:center; box-shadow:0 3px 0 var(--green-dark); flex-shrink:0; text-decoration:none; }
      .topbar-title { font-weight:800; font-size:1.1rem; flex:1; }
      .topbar-title span { color:var(--accent); }
      .back-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:10px; background:var(--green); color:#fff; font-family:var(--font); font-weight:700; font-size:.85rem; text-decoration:none; box-shadow:0 3px 0 var(--green-dark); transition:transform .1s; border:none; cursor:pointer; }
      .back-btn:hover { transform:translateY(-1px); }
      .hamburger { display:none; background:none; border:2px solid var(--border); border-radius:10px; padding:6px 10px; cursor:pointer; font-size:1.1rem; font-family:var(--font); }

      .layout { display:flex; max-width:1200px; margin:0 auto; padding:24px 20px 60px; gap:24px; }
      .sidebar { width:var(--sidebar-w); flex-shrink:0; position:sticky; top:80px; max-height:calc(100vh - 100px); overflow-y:auto; align-self:flex-start; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
      .sidebar-inner { background:var(--card); border-radius:var(--radius); border:2px solid var(--border); padding:16px; box-shadow:var(--shadow); }
      .sidebar-heading { font-size:.75rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin:0 0 12px; }
      .toc-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px; }
      .toc-list a { display:block; padding:6px 10px; border-radius:8px; font-size:.82rem; font-weight:700; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; line-height:1.3; }
      .toc-list a:hover, .toc-list a.active { background:var(--accent-light); color:var(--accent-dark); }

      .content { flex:1; min-width:0; }
      .content-card { background:var(--card); border-radius:var(--radius); border:2px solid var(--border); padding:40px 44px; box-shadow:var(--shadow); }

      .guide-hero { text-align:center; padding-bottom:24px; margin-bottom:8px; border-bottom:2px solid var(--border); }
      .guide-hero .badge { display:inline-block; background:var(--accent-light); color:var(--accent-dark); border:2px solid var(--accent); border-radius:999px; padding:6px 18px; font-weight:800; font-size:.85rem; letter-spacing:.04em; margin-bottom:14px; }
      .guide-hero h1 { margin:0 0 6px; font-size:2.2rem; font-weight:800; }
      .guide-hero .sub { color:var(--text-muted); font-size:1rem; margin:0; }

      .prose h2 { font-size:1.35rem; font-weight:800; margin:2.4em 0 .7em; padding-bottom:10px; border-bottom:2px solid var(--border); color:var(--text); scroll-margin-top:90px; }
      .prose h3 { font-size:1.05rem; font-weight:800; margin:1.6em 0 .5em; color:var(--text); }
      .prose p { margin:.75em 0; line-height:1.7; }
      .prose a { color:var(--blue-dark); font-weight:700; }
      .prose strong { font-weight:800; color:var(--text); }
      .prose em { font-style:italic; }
      .prose hr { border:none; border-top:2px solid var(--border); margin:2em 0; }
      .prose blockquote { margin:1em 0; padding:14px 18px; background:var(--accent-light); border-left:4px solid var(--accent); border-radius:0 12px 12px 0; font-size:.93rem; line-height:1.6; }
      .prose blockquote p { margin:0; }
      .prose code { background:#f0f0f0; border-radius:6px; padding:1px 6px; font-family:'Courier New',monospace; font-size:.88em; color:#c7254e; white-space:nowrap; }
      .prose table { width:100%; border-collapse:collapse; margin:1.2em 0; font-size:.9rem; border-radius:12px; overflow:hidden; border:2px solid var(--border); }
      .prose thead { background:var(--accent-light); }
      .prose th { padding:10px 14px; text-align:left; font-weight:800; font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-dark); border-bottom:2px solid var(--border); }
      .prose td { padding:9px 14px; border-bottom:1px solid var(--border); line-height:1.5; }
      .prose tr:last-child td { border-bottom:none; }
      .prose tr:nth-child(even) td { background:#fafafa; }
      .prose ul, .prose ol { padding-left:1.5em; margin:.6em 0; }
      .prose li { margin:.35em 0; line-height:1.6; }
      .prose h2[id], .prose h3[id] { scroll-margin-top:90px; }

      @media (max-width:900px) {
        .sidebar { display:none; }
        .sidebar.open { display:block; position:fixed; top:70px; left:0; right:0; bottom:0; z-index:99; overflow-y:auto; background:rgba(0,0,0,.4); }
        .sidebar.open .sidebar-inner { margin:16px; }
        .hamburger { display:block; }
        .content-card { padding:24px 18px; }
        .layout { padding:16px 12px 48px; }
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a class="topbar-logo" href="index.html">MM</a>
      <span class="topbar-title">📚 <span>Grammar</span> Guide</span>
      <button class="hamburger" id="hamburger" aria-label="Table of contents">☰ ToC</button>
      <a class="back-btn" href="index.html">← Back to game</a>
    </nav>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <p class="sidebar-heading">Contents</p>
          <ul class="toc-list" id="toc-list"></ul>
        </div>
      </aside>
      <main class="content">
        <div class="content-card">
          <div class="guide-hero">
            <div class="badge">📚 Grammar</div>
            <h1>French Grammar Reference</h1>
            <p class="sub">Gender · Articles · Verbs · Tenses · Negation · Questions · Pronouns · Subjunctive · Register</p>
          </div>
          <div class="prose" id="prose"></div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      fetch('guide-content.md')
        .then((r) => r.text())
        .then((md) => {
          // Strip preamble / ToC block
          md = md
            .replace(/^# .+\n/, '')
            .replace(/^### For .+\n/, '')
            .replace(/^> \*\*How to use[^]*?---\n\n## Table of Contents\n[^]+?\n\n---\n\n/, '');

          // Drop section 1 (pronunciation) — keep from "## 2. Nouns" onward
          const splitIdx = md.indexOf('\n## 2.');
          if (splitIdx !== -1) md = md.slice(splitIdx + 1);

          document.getElementById('prose').innerHTML = marked.parse(md);
          buildToC();
          setupScrollSpy();
        });

      function buildToC() {
        const list = document.getElementById('toc-list');
        document.querySelectorAll('.prose h2').forEach((h, i) => {
          if (!h.id) h.id = 'section-' + i;
          const li = document.createElement('li');
          const a  = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent.replace(/^\d+\.\s*/, '').replace(' — ', ' – ');
          a.addEventListener('click', (e) => {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.getElementById('sidebar').classList.remove('open');
          });
          li.appendChild(a);
          list.appendChild(li);
        });
      }

      function setupScrollSpy() {
        const headings = [...document.querySelectorAll('.prose h2')];
        const links    = [...document.querySelectorAll('.toc-list a')];
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const idx = headings.indexOf(entry.target);
                links.forEach((l) => l.classList.remove('active'));
                if (links[idx]) links[idx].classList.add('active');
              }
            });
          },
          { rootMargin: '-80px 0px -70% 0px' }
        );
        headings.forEach((h) => observer.observe(h));
      }

      document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });
    </script>
  </body>
</html>
